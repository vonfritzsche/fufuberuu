<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>FufuDows XP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    background:url("nyancat.gif") center/cover no-repeat fixed;
    font-family:Tahoma;
    transition:background 1s;
}

#boot{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:1s;
}

#boot img{
    width:420px;
    max-width:90%;
}

.loading{
    width:240px;
    height:18px;
    border:2px solid #777;
    border-radius:4px;
    margin-top:30px;
    overflow:hidden;
}

.bar{
    width:70px;
    height:100%;
    background:linear-gradient(#8fd4ff,#1d5cff,#8fd4ff);
    animation:xp .8s linear infinite;
}

@keyframes xp{
    from{transform:translateX(-70px);}
    to{transform:translateX(240px);}
}

#photo{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:#000;
}

.photo-box{
    display:flex;
    flex-direction:column;
    align-items:center;
}

#photo img{
    max-width:90%;
    max-height:80vh;
}

#love{
    margin-top:18px;
    font-family:"Times New Roman", serif;
    font-size:42px;
    font-weight:bold;
    font-style:italic;
    color:#4A8CFF;
    text-shadow:
        2px 2px 0 #002b7f,
        0 0 10px rgba(74,140,255,.6);
    user-select:none;
}
</style>

</head>
<body>

<div id="boot">
    <img src="xp.png" alt="FufuDows XP">
    <div class="loading">
        <div class="bar"></div>
    </div>
</div>

<div id="photo">
    <div class="photo-box">
        <img src="foto.png" alt="Fotoğraf">
        <div id="love">Love you Fufu &lt;33 !!!!</div>
    </div>
</div>

<script>
const boot = document.getElementById("boot");
const photo = document.getElementById("photo");

setTimeout(() => {

    boot.style.opacity = "0";

    setTimeout(() => {

        boot.style.display = "none";

        // Nyan Cat arka planını kaldır
        document.body.style.background = "#000";

        // Fotoğrafı göster
        photo.style.display = "flex";

    },1000);

},4000);
</script>

</body>
</html>
